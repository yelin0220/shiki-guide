<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Shiki — Guest Guide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #1a2c5b;
      --navy-hover:  #253f82;
      --bg:          #ffffff;
      --card:        #f7f4ef;
      --card-hover:  #eee9e0;
      --border:      #e8e2d8;
      --text:        #1a2c5b;
      --muted:       #8a8fa8;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                   'Helvetica Neue', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
                   'Noto Sans KR', 'Noto Sans JP', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ── Screens ─────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.32, 0, 0.15, 1);
      will-change: transform;
    }
    .screen.active { transform: translateX(0); }
    .screen.exit-left { transform: translateX(-28%); }

    #landing {
      transform: translateX(0);
    }

    /* ── Language pills ──────────────────────────────────── */
    .lang-bar {
      position: absolute;
      top: calc(var(--safe-top) + 18px);
      right: 20px;
      display: flex;
      gap: 6px;
      z-index: 20;
    }
    .lang-btn {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn.on {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }

    /* ── Landing ─────────────────────────────────────────── */
    .landing-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 36px;
      padding-top: calc(var(--safe-top) + 64px);
      text-align: center;
      gap: 0;
    }
    .logo-wrap {
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s forwards;
    }
    .logo-wrap img {
      width: 90px;
      height: auto;
    }
    .welcome-block {
      opacity: 0;
      animation: fadeUp 0.7s 0.4s forwards;
    }
    .welcome-title {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--navy);
      margin-bottom: 14px;
      line-height: 1.2;
    }
    .welcome-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.75;
      letter-spacing: 0.03em;
    }

    /* ── CTA ─────────────────────────────────────────────── */
    .cta-wrap {
      padding: 0 28px;
      padding-bottom: calc(var(--safe-bottom) + 44px);
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.7s 0.6s forwards;
    }
    .btn-fill {
      width: 100%;
      padding: 17px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-fill:active { transform: scale(0.97); background: var(--navy-hover); }

    .btn-outline {
      width: 100%;
      padding: 17px;
      background: transparent;
      color: var(--navy);
      border: 1.5px solid var(--navy);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-outline:active { transform: scale(0.97); background: rgba(26,44,91,0.06); }

    /* ── Nav bar (inner screens) ─────────────────────────── */
    .nav-bar {
      padding: calc(var(--safe-top) + 14px) 20px 14px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 2px;
      color: var(--navy);
      background: none;
      border: none;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      padding: 4px 0;
      min-width: 60px;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .nav-title {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.03em;
      margin-right: 60px; /* balance back-btn */
    }

    /* ── Scroll area ─────────────────────────────────────── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ── Room selection ──────────────────────────────────── */
    .room-section-label {
      padding: 24px 20px 12px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .room-list {
      padding: 0 16px;
      padding-bottom: calc(var(--safe-bottom) + 24px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .room-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .room-card:active { transform: scale(0.98); background: var(--card-hover); }
    .room-info { flex: 1; }
    .room-name {
      font-size: 19px;
      font-weight: 500;
      color: var(--navy);
      letter-spacing: 0.03em;
    }
    .room-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.4;
    }
    .chevron {
      color: var(--muted);
      margin-left: 12px;
      flex-shrink: 0;
    }

    /* ── Guide header ────────────────────────────────────── */
    .guide-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .guide-room-name {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--navy);
    }
    .guide-room-type {
      font-size: 13px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── Guide cards ─────────────────────────────────────── */
    .guide-list {
      padding: 16px 16px;
      padding-bottom: calc(var(--safe-bottom) + 24px);
    }
    .guide-section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 4px 10px;
    }
    .guide-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .guide-card:active { transform: scale(0.98); background: var(--card-hover); }
    .guide-icon {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      flex-shrink: 0;
    }
    .guide-text { flex: 1; }
    .guide-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--navy);
    }
    .guide-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Chevron SVG shorthand ───────────────────────────── */
    .chev-right {
      display: inline-block;
    }
  </style>
</head>

/* ══════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════ */
function push(screenId) {
  const current = document.getElementById(history[history.length - 1]);
  const next    = document.getElementById(screenId);

  current.classList.add('exit-left');
  next.classList.add('active');
  history.push(screenId);

  // Clean up exit-left after transition
  setTimeout(() => current.classList.remove('exit-left'), 400);
}

function pop() {
  if (history.length <= 1) return;
  const currentId = history.pop();
  const current   = document.getElementById(currentId);
  const prevId    = history[history.length - 1];
  const prev      = document.getElementById(prevId);

  current.style.transition = 'transform 0.32s cubic-bezier(0.32,0,0.15,1)';
  current.classList.remove('active');
  prev.classList.remove('exit-left');

  setTimeout(() => { current.style.transition = ''; }, 350);
}

function selectRoom(roomKey) {
  activeRoom = roomKey;
  renderGuide();
  push('s-guide');
}

function openCheckin() {
  window.open('https://checkin.hotelshiki.com/en/checkin', '_blank');
}

/* ══════════════════════════════════════════════════
   LANGUAGE
═══════════════════════════════════════════════════ */
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('on'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('on');
  renderAll();
}

function t(key) { return I18N[lang][key] || ''; }
function lk(key) { return LINKS[key][lang]; }

/* ══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
function renderAll() {
  const i = I18N[lang];

  // Landing
  el('lbl-welcome-title').textContent  = i.welcome_title;
  el('lbl-welcome-sub').innerHTML      = i.welcome_sub.replace(/\n/g, '<br>');
  el('btn-guide').textContent          = i.btn_guide;
  el('btn-checkin').textContent        = i.btn_checkin;

  // Rooms screen
  el('lbl-back-rooms').textContent     = i.back;
  el('lbl-nav-rooms').textContent      = i.nav_rooms;
  el('lbl-room-section').textContent   = i.room_section;

  Object.keys(ROOMS).forEach(key => {
    const sub = document.getElementById('sub-' + key);
    if (sub) sub.textContent = ROOMS[key].sub[lang];
  });

  // Guide screen
  el('lbl-back-guide').textContent     = i.back;
  el('lbl-nav-guide').textContent      = i.nav_guide;

  if (activeRoom) renderGuide();
}

function renderGuide() {
  const room = ROOMS[activeRoom];
  const i    = I18N[lang];

  el('g-room-name').textContent = room.name;
  el('g-room-type').textContent = room.sub[lang];

  const roomItems = [
    { icon:'🔑', label: i.lbl_checkin,   desc: i.dsc_checkin,   url: lk(room.checkin)  },
    { icon:'🚪', label: i.lbl_checkout,  desc: i.dsc_checkout,  url: lk(room.checkout) },
    { icon:'🛏', label: i.lbl_roomguide, desc: i.dsc_roomguide, url: lk(room.rmGuide)  },
  ];
  const commonItems = [
    { icon:'🚗', label: i.lbl_parking, desc: i.dsc_parking, url: lk('parking')     },
    { icon:'📋', label: i.lbl_rules,   desc: i.dsc_rules,   url: lk('stay_rules')  },
    { icon:'🗺', label: i.lbl_travel,  desc: i.dsc_travel,  url: lk('travel_guide') },
    { icon:'📖', label: i.lbl_story,   desc: i.dsc_story,   url: lk('shiki_story') },
  ];

  const list = el('guide-list');
  list.innerHTML = '';

  appendSection(list, i.sec_room,    roomItems);
  appendSection(list, i.sec_common,  commonItems);
}

function appendSection(container, label, items) {
  const sec = document.createElement('div');
  sec.className = 'guide-section-label';
  sec.textContent = label;
  container.appendChild(sec);

  items.forEach(item => {
    const a = document.createElement('a');
    a.href   = item.url;
    a.target = '_blank';
    a.rel    = 'noopener noreferrer';
    a.className = 'guide-card';
    a.innerHTML = `
      <div class="guide-icon">${item.icon}</div>
      <div class="guide-text">
        <div class="guide-name">${item.label}</div>
        <div class="guide-desc">${item.desc}</div>
      </div>
      <div class="chevron">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>`;
    container.appendChild(a);
  });
}

function el(id) { return document.getElementById(id); }

/* ══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
renderAll();
</script>
