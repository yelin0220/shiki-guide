<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1c2d5b">
  <title>Shiki — Guest Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #1c2d5b;
      --cream:       #f0f2e8;
      --muted:       #8a8fa8;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      font-family: 'DM Sans', 'Noto Sans KR', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ── Screens ──────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.32, 0, 0.15, 1);
      will-change: transform;
    }
    .screen.active    { transform: translateX(0); }
    .screen.exit-left { transform: translateX(-28%); }

    /* ════════════════════════════════════════
       SCREEN 1 — SPLASH
    ════════════════════════════════════════ */
    #s-splash {
      transform: translateX(0);
      background: var(--navy);
      flex-direction: column;
    }

    /* Hero image — top portion */
    .splash-image {
      position: relative;
      flex: 1;
      overflow: hidden;
      will-change: transform;
    }
    .splash-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 72%;
      display: block;
      transform: scale(1.6);
      transform-origin: center 70%;
    }
    .splash-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,18,40,0.15) 0%,
        rgba(10,18,40,0.05) 35%,
        rgba(10,18,40,0.55) 75%,
        rgba(10,18,40,0.72) 100%
      );
    }
    /* Logo overlay on image */
    .splash-logo-wrap {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
    }
    .splash-logo-wrap img {
      width: 146px;
      height: auto;
      filter: brightness(0) invert(1);
    }

    /* Text overlay at bottom of image */
    .splash-image-text {
      position: absolute;
      bottom: 32px;
      left: 0; right: 0;
      z-index: 2;
      text-align: center;
      padding: 0 28px;
    }
    .splash-image-welcome {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 8px;
    }
    .splash-image-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 6px;
    }
    .splash-image-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.68);
      letter-spacing: 0.03em;
    }

    /* Bottom CTA area */
    .splash-cta {
      background: #faf2e8;
      padding: 30px 32px;
      padding-bottom: calc(var(--safe-bottom) + 38px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .btn-start {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: #faf2e8;
      border: none;
      border-radius: 50px;
      padding: 18px 72px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn-start:active { transform: scale(0.97); }

    /* Splash exit animations */
    #s-splash.exiting .splash-image {
      animation: splashSlideUp 0.78s cubic-bezier(0.22, 0, 0.36, 1) forwards;
    }
    #s-splash.exiting .splash-cta {
      animation: splashFadeOut 0.3s ease-out 0.18s forwards;
    }
    @keyframes splashSlideUp {
      0%   { transform: translateY(0);     opacity: 1; }
      10%  { transform: translateY(5%);    opacity: 1; }
      22%  { transform: translateY(-18%);  opacity: 1; }
      38%  { transform: translateY(-8%);   opacity: 1; }
      55%  { transform: translateY(-55%);  opacity: 0.9; }
      100% { transform: translateY(-115%); opacity: 0.5; }
    }
    @keyframes splashFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* ════════════════════════════════════════
       PERSISTENT LANG BAR
    ════════════════════════════════════════ */
    .lang-bar {
      position: absolute;
      top: calc(var(--safe-top) + 16px);
      right: 18px;
      display: flex;
      gap: 5px;
      z-index: 50;
    }
    .lang-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn.on {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.7);
      color: #fff;
    }
    /* On light screens */
    .screen.light-bg .lang-bar .lang-btn {
      border-color: rgba(28,45,91,0.25);
      color: rgba(28,45,91,0.5);
    }
    .screen.light-bg .lang-bar .lang-btn.on {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }

    /* ════════════════════════════════════════
       SCREEN 2 — MENU (Yufuin Main)
    ════════════════════════════════════════ */
    #s-menu {
      background: #faf2e8;
    }

    /* Slideshow */
    .slideshow {
      position: relative;
      flex-shrink: 0;
      height: 52vh;
      overflow: hidden;
      background: #0d1a38;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    .slide.active { opacity: 1; }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    .slide-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 2;
    }
    .slide-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transition: background 0.3s, transform 0.3s;
    }
    .slide-dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* Menu body */
    .menu-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px 24px;
      padding-bottom: calc(var(--safe-bottom) + 32px);
      gap: 12px;
    }
    .menu-greeting {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(10,18,40,0.45);
      margin-bottom: 2px;
    }
    .menu-question {
      font-size: 18px;
      font-weight: 300;
      color: var(--navy);
      letter-spacing: 0.03em;
      margin-bottom: 12px;
    }
    .btn-primary {
      width: 100%;
      padding: 16px 24px;
      border-radius: 14px;
      border: none;
      background: var(--cream);
      color: var(--navy);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.15s;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      width: 100%;
      padding: 15px 24px;
      border-radius: 14px;
      border: 1.5px solid rgba(10,18,40,0.25);
      background: transparent;
      color: var(--navy);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .btn-secondary:active { transform: scale(0.98); }

    /* ════════════════════════════════════════
       SCREEN 3 — ROOM LIST
    ════════════════════════════════════════ */
    #s-rooms {
      background: var(--cream);
    }

    .nav-bar {
      display: flex;
      align-items: center;
      padding: calc(var(--safe-top) + 18px) 20px 14px;
      gap: 8px;
      flex-shrink: 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--navy);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 8px 6px 2px;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.7;
    }
    .back-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .nav-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.02em;
      flex: 1;
      text-align: center;
      margin-right: 48px;
    }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 20px;
      padding-bottom: calc(var(--safe-bottom) + 24px);
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 12px 0 14px;
    }

    .room-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .room-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, background 0.12s;
      box-shadow: 0 1px 4px rgba(28,45,91,0.06);
    }
    .room-card:active { transform: scale(0.98); background: #f5f5f5; }
    .room-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.01em;
    }
    .room-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }
    .chevron {
      color: rgba(28,45,91,0.35);
      flex-shrink: 0;
    }

    /* ════════════════════════════════════════
       SCREEN 4 — GUIDE LINKS
    ════════════════════════════════════════ */
    #s-guide {
      background: var(--cream);
    }

    .guide-header {
      padding: 8px 24px 20px;
      border-bottom: 1px solid rgba(28,45,91,0.08);
      flex-shrink: 0;
    }
    .guide-room-name {
      font-size: 22px;
      font-weight: 300;
      color: var(--navy);
      letter-spacing: 0.04em;
    }
    .guide-room-type {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .guide-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 10px;
    }
    .guide-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .guide-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, background 0.12s;
      box-shadow: 0 1px 3px rgba(28,45,91,0.05);
    }
    .guide-card:active { transform: scale(0.98); background: #f5f5f5; }
    .guide-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .guide-text { flex: 1; }
    .guide-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
    }
    .guide-desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .guide-arrow {
      color: rgba(28,45,91,0.3);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══ SCREEN 1: SPLASH ═══════════════════════════════ -->
  <div id="s-splash" class="screen active">

    <div class="splash-image" id="splash-img">
      <img src="images/main_image.jpg" alt="Shiki">
      <div class="splash-logo-wrap">
        <img src="logo/Logo_2.png" alt="Shiki">
      </div>
      <div class="splash-image-text">
        <div class="splash-image-welcome">Welcome to Shiki</div>
        <div class="splash-image-sub">A place to discover a new lifestyle</div>
      </div>
    </div>

    <div class="splash-cta" id="splash-cta">
      <button class="btn-start" id="btn-start" onclick="startExperience()">START</button>
    </div>

  </div>

  <!-- ═══ SCREEN 2: YUFUIN MENU ═══════════════════════════ -->
  <div id="s-menu" class="screen">

    <div class="lang-bar">
      <button class="lang-btn on" onclick="setLang('ko')">KR</button>
      <button class="lang-btn"    onclick="setLang('en')">EN</button>
      <button class="lang-btn"    onclick="setLang('ja')">JP</button>
    </div>

    <div class="slideshow" id="slideshow">
      <div class="slide-dots" id="slide-dots"></div>
    </div>

    <div class="menu-body">
      <div class="menu-greeting" id="menu-greeting">Shiki Art Hotel &amp; Private Villa Yufuin</div>
      <div class="menu-question" id="menu-question">무엇을 도와드릴까요?</div>
      <button class="btn-primary"   id="btn-guide"   onclick="push('s-rooms')"></button>
      <button class="btn-secondary" id="btn-checkin" onclick="openCheckin()"></button>
    </div>
  </div>

  <!-- ═══ SCREEN 3: ROOM LIST ══════════════════════════════ -->
  <div id="s-rooms" class="screen light-bg">

    <div class="lang-bar">
      <button class="lang-btn on" onclick="setLang('ko')">KR</button>
      <button class="lang-btn"    onclick="setLang('en')">EN</button>
      <button class="lang-btn"    onclick="setLang('ja')">JP</button>
    </div>

    <div class="nav-bar">
      <button class="back-btn" onclick="pop()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span id="lbl-back-rooms"></span>
      </button>
      <div class="nav-title" id="lbl-nav-rooms"></div>
    </div>

    <div class="scroll-area">
      <div class="section-label" id="lbl-room-section"></div>
      <div class="room-list">

        <div class="room-card" onclick="selectRoom('reflections')">
          <div class="room-info">
            <div class="room-name">Reflections</div>
            <div class="room-sub" id="sub-reflections"></div>
          </div>
          <div class="chevron">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>

        <div class="room-card" onclick="selectRoom('rising_sun')">
          <div class="room-info">
            <div class="room-name">Rising Sun</div>
            <div class="room-sub" id="sub-rising_sun"></div>
          </div>
          <div class="chevron">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>

        <div class="room-card" onclick="selectRoom('daydream')">
          <div class="room-info">
            <div class="room-name">Daydream</div>
            <div class="room-sub" id="sub-daydream"></div>
          </div>
          <div class="chevron">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>

        <div class="room-card" onclick="selectRoom('lucid')">
          <div class="room-info">
            <div class="room-name">Lucid</div>
            <div class="room-sub" id="sub-lucid"></div>
          </div>
          <div class="chevron">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ═══ SCREEN 4: GUIDE LINKS ════════════════════════════ -->
  <div id="s-guide" class="screen light-bg">

    <div class="lang-bar">
      <button class="lang-btn on" onclick="setLang('ko')">KR</button>
      <button class="lang-btn"    onclick="setLang('en')">EN</button>
      <button class="lang-btn"    onclick="setLang('ja')">JP</button>
    </div>

    <div class="nav-bar">
      <button class="back-btn" onclick="pop()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span id="lbl-back-guide"></span>
      </button>
      <div class="nav-title" id="lbl-nav-guide"></div>
    </div>

    <div class="guide-header">
      <div class="guide-room-name" id="g-room-name"></div>
      <div class="guide-room-type" id="g-room-type"></div>
    </div>

    <div class="scroll-area">
      <div id="guide-list"></div>
    </div>

  </div>

</div><!-- #app -->

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const CHECKIN_URL = 'https://checkin.hotelshiki.com/en/checkin';

const LINKS = {

  checkin_villa: { ko:'https://spvy-check-in-guide-kr-i34x94n.gamma.site/',     en:'https://spvy-check-in-guide-en-pgpw2un.gamma.site/',     ja:'https://spvy-check-in-guide-jp-jkrw684.gamma.site/' },

  checkout_villa:{ ko:'https://spvy-check-out-guide-kr-0ia7k66.gamma.site/',    en:'https://spvy-check-out-guide-en-awe7eso.gamma.site/',    ja:'https://spvy-check-out-guide-jp-wqr6reo.gamma.site/' },

  rm_daydream:   { ko:'https://daydream-room-guide-kr-wedlwsf.gamma.site/',     en:'https://daydream-room-guide-en-vj6c4ud.gamma.site/',     ja:'https://daydream-room-guide-jp-r2f0dgv.gamma.site/' },
  rm_lucid:      { ko:'https://lucid-room-guide-kr-pl018qa.gamma.site/',        en:'https://lucid-room-guide-en-uk9ilfi.gamma.site/',        ja:'https://lucid-room-guide-jp-07eg14u.gamma.site/' },
  parking:       { ko:'https://parking-information-kr-924yisr.gamma.site/',     en:'https://parking-information-en-vuiscni.gamma.site/',     ja:'https://parking-information-jp-l9tdskr.gamma.site/' },
  stay_rules:    { ko:'https://stay-rules--tbaftms.gamma.site/',                en:'https://stay-rules-ydam8ex.gamma.site/',                ja:'https://stay-rules-kculc94.gamma.site/' },
  travel_guide:  { ko:'https://travel-guide-kr-q585gz0.gamma.site/',            en:'https://travel-guide-en-ppcqwo3.gamma.site/',            ja:'https://travel-guide-jp-j4umgv0.gamma.site/' },
  shiki_story:   { ko:'https://shiki-story-a51q8js.gamma.site/',                en:'https://shiki-story-english-974ycx0.gamma.site/',        ja:'https://shiki-story-qfypmq2.gamma.site/' },
};

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let lang        = 'ko';
let screenStack = ['s-splash'];
let slideIdx    = 0;
let slideTimer  = null;
let currentRoom = null;

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
function push(id) {
  const prev   = screenStack[screenStack.length - 1];
  const prevEl = document.getElementById(prev);
  const nextEl = document.getElementById(id);

  prevEl.classList.add('exit-left');
  nextEl.classList.add('active');
  screenStack.push(id);

  setTimeout(() => prevEl.classList.remove('exit-left'), 420);
}

function pop() {
  if (screenStack.length <= 1) return;
  const curr   = screenStack.pop();
  const prev   = screenStack[screenStack.length - 1];
  const currEl = document.getElementById(curr);
  const prevEl = document.getElementById(prev);

  currEl.classList.remove('active');
  prevEl.classList.remove('exit-left');
}

/* ══════════════════════════════════════════
   SPLASH TRANSITION
══════════════════════════════════════════ */
function startExperience() {
  const splash = document.getElementById('s-splash');
  splash.classList.add('exiting');

  setTimeout(() => {
    splash.classList.remove('active', 'exiting');
    const menu = document.getElementById('s-menu');
    menu.style.transition = 'none';
    menu.style.transform  = 'translateX(0)';
    menu.classList.add('active');
    screenStack = ['s-menu'];
    requestAnimationFrame(() => { menu.style.transition = ''; });
    startSlideshow();
  }, 620);
}

/* ══════════════════════════════════════════
   SLIDESHOW
══════════════════════════════════════════ */
function initSlideshow() {
  const ss   = document.getElementById('slideshow');
  const dots = document.getElementById('slide-dots');

  SLIDES.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src     = src;
    img.alt     = '';
    img.loading = i < 3 ? 'eager' : 'lazy';
    slide.appendChild(img);
    ss.insertBefore(slide, dots);

    const dot = document.createElement('div');
    dot.className = 'slide-dot' + (i === 0 ? ' active' : '');
    dots.appendChild(dot);
  });
}

function startSlideshow() {
  if (slideTimer) clearInterval(slideTimer);
  slideTimer = setInterval(nextSlide, 4000);
}

function nextSlide() {
  const slides = document.querySelectorAll('.slide');
  const dotEls = document.querySelectorAll('.slide-dot');
  slides[slideIdx].classList.remove('active');
  dotEls[slideIdx].classList.remove('active');
  slideIdx = (slideIdx + 1) % SLIDES.length;
  slides[slideIdx].classList.add('active');
  dotEls[slideIdx].classList.add('active');
}

/* ══════════════════════════════════════════
   LANGUAGE
══════════════════════════════════════════ */
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    const m = b.getAttribute('onclick').match(/'(\w+)'/);
    if (m) b.classList.toggle('on', m[1] === l);
  });
  applyI18N();
}

function applyI18N() {
  const i = I18N[lang];

  document.getElementById('menu-greeting').textContent = i.menu_greeting;
  document.getElementById('menu-question').textContent = i.menu_question;
  document.getElementById('btn-guide').textContent     = i.btn_guide;
  document.getElementById('btn-checkin').textContent   = i.btn_checkin;

  document.getElementById('lbl-back-rooms').textContent  = i.back;
  document.getElementById('lbl-nav-rooms').textContent   = i.nav_rooms;
  document.getElementById('lbl-room-section').textContent = i.room_section;
  document.getElementById('sub-reflections').textContent  = ROOMS.reflections.sub[lang];
  document.getElementById('sub-rising_sun').textContent   = ROOMS.rising_sun.sub[lang];
  document.getElementById('sub-daydream').textContent     = ROOMS.daydream.sub[lang];
  document.getElementById('sub-lucid').textContent        = ROOMS.lucid.sub[lang];

  document.getElementById('lbl-back-guide').textContent = i.back;
  document.getElementById('lbl-nav-guide').textContent  = i.nav_guide;

  if (currentRoom) renderGuide(currentRoom);
}

/* ══════════════════════════════════════════
   ROOM SELECTION
══════════════════════════════════════════ */
function selectRoom(roomKey) {
  currentRoom = roomKey;
  renderGuide(roomKey);
  push('s-guide');
}

function renderGuide(roomKey) {
  const room = ROOMS[roomKey];
  const i    = I18N[lang];

  document.getElementById('g-room-name').textContent = room.name;
  document.getElementById('g-room-type').textContent = room.sub[lang];

  const sections = [
    {
      label: i.sec_room,
      items: [
        { key: 'lbl_checkin',   dsc: 'dsc_checkin',   link: LINKS[room.checkin][lang],  icon: '🔑' },
        { key: 'lbl_checkout',  dsc: 'dsc_checkout',  link: LINKS[room.checkout][lang], icon: '🧳' },
        { key: 'lbl_roomguide', dsc: 'dsc_roomguide', link: LINKS[room.rmGuide][lang],  icon: '🏠' },
      ]
    },
    {
      label: i.sec_common,
      items: [
        { key: 'lbl_rules',   dsc: 'dsc_rules',   link: LINKS.stay_rules[lang],   icon: '📋' },
        { key: 'lbl_story',   dsc: 'dsc_story',   link: LINKS.shiki_story[lang],  icon: '✨' },
        { key: 'lbl_travel',  dsc: 'dsc_travel',  link: LINKS.travel_guide[lang], icon: '🗺️' },
        { key: 'lbl_parking', dsc: 'dsc_parking', link: LINKS.parking[lang],      icon: '🚗' },
      ]
    }
  ];

  let html = '';
  sections.forEach(sec => {
    html += `<div class="guide-section-label">${sec.label}</div><div class="guide-list">`;
    sec.items.forEach(item => {
      html += `
        <a class="guide-card" href="${item.link}" target="_blank" rel="noopener">
          <div class="guide-icon">${item.icon}</div>
          <div class="guide-text">
            <div class="guide-name">${i[item.key]}</div>
            <div class="guide-desc">${i[item.dsc]}</div>
          </div>
          <div class="guide-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </a>`;
    });
    html += '</div>';
  });

  document.getElementById('guide-list').innerHTML = html;
}
