  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:        #1c2d5b;
      --cream:       #faf2e8;
      --muted:       #8a8fa8;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      height: 100svh;
      height: var(--vh, 100svh);
      background: var(--navy);
      font-family: 'DM Sans', 'Noto Sans KR', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overflow: hidden;
    }
    #app { width: 100%; height: 100%; position: relative; overflow: hidden; }

    /* GLOBAL LANG-BAR */
    .lang-bar { position: absolute; top: calc(var(--safe-top) + 16px); left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 200; background: #856d47; border-radius: 50px; padding: 4px 6px; }
    #global-nav-bar { display: none; position: absolute; top: 0; left: 0; right: 0; z-index: 100; background: var(--cream); }
    .lang-btn {
      padding: 4px 11px; border-radius: 20px; border: none; background: transparent;
      color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 700;
      letter-spacing: 0.05em; cursor: pointer; transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn.on { background: rgba(255,255,255,0.25); color: #fff; }

    /* SCREENS */
    .screen {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.32, 0, 0.15, 1);
      will-change: transform;
    }
    .screen.active    { transform: translateX(0); }
    .screen.exit-left { transform: translateX(-28%); }

    /* SPLASH */
    #s-splash { transform: translateX(0); background: #faf2e8; flex-direction: column; }
    .splash-image-clip { flex: 1; overflow: hidden; position: relative; }
    .splash-image { position: absolute; top: -10%; left: 0; right: 0; bottom: 0; height: calc(100% + 10%); overflow: hidden; will-change: transform; }
    .splash-image img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; }
    .splash-image::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,18,40,0.15) 0%, rgba(10,18,40,0.05) 35%, rgba(10,18,40,0.55) 75%, rgba(10,18,40,0.72) 100%); }
    .splash-logo-wrap { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; text-align: center; }
    .splash-logo-wrap img { width: 146px; height: auto; filter: brightness(0) invert(1); }
    .splash-image-text { position: absolute; bottom: 32px; left: 0; right: 0; z-index: 2; text-align: center; padding: 0 28px; }
    .splash-image-welcome { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: #ffffff; margin-bottom: 8px; text-shadow: 0 1px 6px rgba(0,0,0,0.6); }
    .splash-image-sub { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 300; font-style: italic; color: #ffffff; letter-spacing: 0.03em; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
    .splash-cta { background: #faf2e8; padding: 30px 32px; padding-bottom: calc(var(--safe-bottom) + 38px); display: flex; flex-direction: column; align-items: center; }
    .btn-start { font-family: 'DM Sans', sans-serif; background: var(--navy); color: #faf2e8; border: none; border-radius: 50px; padding: 18px 72px; font-size: 12px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.1s, opacity 0.1s; }
    .btn-start:active { transform: scale(0.97); }
    #s-splash.exiting .splash-image { animation: splashSlideUp 0.65s linear forwards; }
    #s-splash.exiting .splash-cta   { animation: splashFadeOut 0.25s ease-out forwards; }
    @keyframes splashSlideUp {
      0%   { transform: translateY(0);     opacity: 1; animation-timing-function: ease-out; }
      10%  { transform: translateY(5%);    opacity: 1; animation-timing-function: cubic-bezier(0.55, 0, 1, 1); }
      100% { transform: translateY(-115%); opacity: 0.4; }
    }
    @keyframes splashFadeOut { from { opacity: 1; } to { opacity: 0; } }

    /* MENU */
    #s-menu { background: #faf2e8; }
    .slideshow { position: relative; flex-shrink: 0; height: 52vh; height: 52svh; overflow: hidden; background: #0d1a38; }
    .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.9s ease; }
    .slide.active { opacity: 1; }
    .slide img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
    .slide-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 2; }
    .slide-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: background 0.3s, transform 0.3s; }
    .slide-dot.active { background: #fff; transform: scale(1.3); }
    .menu-body { flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: flex-start; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 28px 24px; padding-bottom: calc(var(--safe-bottom) + 32px); gap: 12px; }
    .menu-greeting { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(10,18,40,0.45); margin-bottom: 2px; }
    .menu-question { font-size: 20px; font-weight: 600; color: var(--navy); letter-spacing: 0.01em; margin-bottom: 6px; white-space: pre-line; }
    .menu-desc { font-size: 13px; font-weight: 400; color: rgba(10,18,40,0.55); line-height: 1.55; margin-bottom: 8px; }
    .btn-primary { width: 100%; margin-top: auto; padding: 16px 24px; border-radius: 14px; border: none; background: #1c2d5b; color: #ffffff; font-size: 14px; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.1s, opacity 0.15s; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary { width: 100%; padding: 16px 24px; border-radius: 14px; border: none; background: #1c2d5b; color: #ffffff; font-size: 14px; font-weight: 600; letter-spacing: 0.06em; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
    .btn-secondary:active { transform: scale(0.98); }

    /* ROOMS */
    #s-rooms { background: #faf2e8; }
    .nav-bar { position: relative; height: calc(var(--safe-top) + 60px); flex-shrink: 0; }
    .back-btn { position: absolute; top: calc(var(--safe-top) + 16px); left: 16px; z-index: 200; display: flex; align-items: center; gap: 4px; background: none; border: none; color: var(--navy); font-size: 14px; font-weight: 500; cursor: pointer; padding: 6px 8px 6px 2px; -webkit-tap-highlight-color: transparent; opacity: 0.7; }
    .back-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-title { display: none; }
    #s-rooms .scroll-area { padding-top: 8px; }
    #s-guide .guide-header { padding-top: 8px; }
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 20px; padding-bottom: calc(var(--safe-bottom) + 24px); }
    .section-room-title { font-size: 22px; font-weight: 700; color: var(--navy); letter-spacing: 0.06em; text-transform: uppercase; margin: 20px 0 4px; }
    .section-room-subtitle { font-size: 12px; color: var(--muted); margin: 0 0 20px; text-transform: lowercase; letter-spacing: 0.02em; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 0 0 24px; }
    .room-list { display: flex; flex-direction: column; gap: 10px; }
    .room-card { background: #fff; border-radius: 16px; padding: 20px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.1s, background 0.12s; box-shadow: 0 1px 4px rgba(28,45,91,0.06); }
    .room-card:active { transform: scale(0.98); background: #f5f5f5; }
    .room-name { font-size: 17px; font-weight: 600; color: var(--navy); letter-spacing: 0.01em; }
    .room-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .chevron { color: rgba(28,45,91,0.35); flex-shrink: 0; }

    /* GUIDE */
    #s-guide { background: #faf2e8; }
    .guide-header { padding: 8px 24px 20px; border-bottom: 1px solid rgba(28,45,91,0.08); flex-shrink: 0; }
    .guide-room-name { font-size: 22px; font-weight: 700; color: var(--navy); letter-spacing: 0.04em; }
    .guide-room-type { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .guide-section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin: 20px 0 10px; }
    .guide-list { display: flex; flex-direction: column; gap: 8px; }
    .guide-card { background: #fff; border-radius: 14px; padding: 16px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; text-decoration: none; -webkit-tap-highlight-color: transparent; transition: transform 0.1s, background 0.12s; box-shadow: 0 1px 3px rgba(28,45,91,0.05); }
    .guide-card:active { transform: scale(0.98); background: #f5f5f5; }
    .guide-icon { width: 42px; height: 42px; border-radius: 10px; background: #e8e2d8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .guide-text { flex: 1; }
    .guide-name { font-size: 14px; font-weight: 600; color: var(--navy); }
    .guide-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .guide-arrow { color: rgba(28,45,91,0.3); flex-shrink: 0; }
  </style>
</head>

// =========================================================
// NAVIGATION
// =========================================================
function push(id) {
  const prev=screenStack[screenStack.length-1], prevEl=document.getElementById(prev), nextEl=document.getElementById(id);
  prevEl.classList.add('exit-left'); nextEl.classList.add('active'); screenStack.push(id);
  updateGlobalNav(id);
  setTimeout(() => prevEl.classList.remove('exit-left'), 420);
}

function pop() {
  if (screenStack.length <= 1) return;
  const curr=screenStack.pop(), prev=screenStack[screenStack.length-1];
  document.getElementById(curr).classList.remove('active');
  document.getElementById(prev).classList.remove('exit-left');
  updateGlobalNav(prev);
}

function startExperience() {
  const splash=document.getElementById('s-splash'), menu=document.getElementById('s-menu');
  menu.style.transition='none'; menu.style.transform='translateX(0)'; menu.style.opacity='0';
  menu.classList.add('active'); screenStack=['s-menu'];
  splash.classList.add('exiting');
  setTimeout(() => { document.getElementById('global-lang-bar').style.display='flex'; menu.style.transition='opacity 0.42s ease-out'; menu.style.opacity='1'; }, 260);
  setTimeout(() => { splash.classList.remove('active','exiting'); menu.style.transition=''; menu.style.opacity=''; menu.style.transform=''; startSlideshow(); }, 720);
}

// =========================================================
// SLIDESHOW
// =========================================================
function initSlideshow() {
  const ss=document.getElementById('slideshow'), dots=document.getElementById('slide-dots');
  SLIDES.forEach((src,i) => {
    const slide=document.createElement('div'); slide.className='slide'+(i===0?' active':'');
    const img=document.createElement('img'); img.src=src; img.alt=''; img.loading=i<3?'eager':'lazy';
    slide.appendChild(img); ss.insertBefore(slide,dots);
    const dot=document.createElement('div'); dot.className='slide-dot'+(i===0?' active':''); dots.appendChild(dot);
  });
}

function startSlideshow() {
  if (slideTimer) clearInterval(slideTimer);
  slideTimer = setInterval(nextSlide, 4000);
}

function nextSlide() {
  const slides=document.querySelectorAll('.slide'), dotEls=document.querySelectorAll('.slide-dot');
  slides[slideIdx].classList.remove('active'); dotEls[slideIdx].classList.remove('active');
  slideIdx=(slideIdx+1)%SLIDES.length;
  slides[slideIdx].classList.add('active'); dotEls[slideIdx].classList.add('active');
}

// LANGUAGE
// =========================================================
function setLang(l) {
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    const m=b.getAttribute('onclick').match(/'(\w+)'/);
    if (m) b.classList.toggle('on', m[1]===l);
  });
  applyI18N();
}

function updateGlobalNav(screenId) {
  const gnav=document.getElementById('global-nav-bar');
  if (!gnav) return;
  const glbl=document.getElementById('lbl-back-global');
  const gnvt=document.getElementById('lbl-nav-global');
  const i=I18N[lang];
  if (screenId==='s-rooms') {
    gnav.style.display='block'; if(glbl)glbl.textContent=i.back; if(gnvt)gnvt.textContent=i.nav_rooms;
  } else if (screenId==='s-guide') {
    gnav.style.display='block'; if(glbl)glbl.textContent=i.back; if(gnvt)gnvt.textContent=i.nav_guide;
  } else {
    gnav.style.display='none';
  }
}

function applyI18N() {
  const i=I18N[lang];
  document.getElementById('menu-greeting').textContent=i.menu_greeting;
  document.getElementById('menu-question').textContent=i.menu_question;
  document.getElementById('menu-desc').textContent=i.menu_desc;
  document.getElementById('btn-guide').textContent=i.btn_guide;
  document.getElementById('btn-checkin').textContent=i.btn_checkin;
  document.getElementById('lbl-nav-rooms').textContent=i.nav_rooms;
  document.getElementById('lbl-rooms-title').textContent=i.nav_rooms;
  document.getElementById('lbl-room-section').textContent=i.room_section;
  initRooms();
  updateGlobalNav(screenStack[screenStack.length-1]);

}

    sec.items.forEach(item => {
      const a=document.createElement('a'); a.className='guide-card'; a.href=item.link; a.target='_blank'; a.rel='noopener';
      a.innerHTML=`<div class="guide-icon">${item.icon}</div><div class="guide-text"><div class="guide-name">${i[item.key]}</div><div class="guide-desc">${i[item.dsc]}</div></div><div class="guide-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>`;
      list.appendChild(a);
    });
    container.appendChild(list);
  });
}

function openCheckin() { window.open(CHECKIN_URL,'_blank','noopener'); }

initSlideshow();
applyI18N();
</script>
