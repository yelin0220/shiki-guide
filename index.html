<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Shiki — Guest Guide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #1a2c5b;
      --bg:       #ffffff;
      --card:     #f7f4ef;
      --card-hover: #eee9e0;
      --border:   #e8e2d8;
      --muted:    #8a8fa8;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--navy);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                   'Helvetica Neue', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
                   'Noto Sans KR', 'Noto Sans JP', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }

    .page {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding-top: calc(var(--safe-top) + 0px);
      padding-bottom: calc(var(--safe-bottom) + 0px);
    }

    /* ── Lang bar ── */
    .lang-bar {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      padding: calc(var(--safe-top) + 18px) 20px 0;
    }
    .lang-btn {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn.on {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 32px 32px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.7s 0.15s forwards;
    }
    .hero img {
      width: 80px;
      margin-bottom: 28px;
    }
    .hero-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .hero-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── Property cards ── */
    .card-list {
      padding: 8px 16px;
      padding-bottom: calc(var(--safe-bottom) + 32px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.7s 0.3s forwards;
    }

    .prop-card {
      border-radius: 18px;
      padding: 22px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .prop-card.active {
      background: var(--card);
    }
    .prop-card.active:active {
      transform: scale(0.98);
      background: var(--card-hover);
    }
    .prop-card.inactive {
      background: var(--card);
      cursor: default;
    }

    .prop-icon {
      width: 48px;
      height: 48px;
      border-radius: 13px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .prop-card.inactive .prop-icon {
      background: #d4d0c8;
    }

    .prop-text { flex: 1; }
    .prop-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.02em;
    }
    .prop-card.inactive .prop-name {
      color: var(--muted);
    }
    .prop-loc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .prop-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .badge-active {
      background: rgba(26,44,91,0.1);
      color: var(--navy);
    }
    .badge-soon {
      background: #ece9e2;
      color: var(--muted);
    }

    .chevron { color: var(--muted); flex-shrink: 0; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="lang-bar">
    <button class="lang-btn on" onclick="setLang('ko')">한</button>
    <button class="lang-btn"   onclick="setLang('en')">EN</button>
    <button class="lang-btn"   onclick="setLang('ja')">日</button>
  </div>

  <div class="hero">
    <img src="logo/Logo_2.png" alt="Shiki">
    <div class="hero-title" id="hero-label">지점을 선택해주세요</div>
    <div class="hero-sub" id="hero-sub">안내를 확인하실 지점을 선택해주세요.</div>
  </div>

  <div class="card-list">

    <!-- Yufuin — active -->
    <a class="prop-card active" href="yufuin/">
      <div class="prop-icon">🏯</div>
      <div class="prop-text">
        <div class="prop-name">Yufuin</div>
        <div class="prop-loc">shiki art hotel &amp; private villa yufuin</div>
      </div>
      <span class="prop-badge badge-active" id="badge-yufuin">안내 보기</span>
      <div class="chevron">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </a>

    <!-- Beppu — coming soon -->
    <div class="prop-card inactive">
      <div class="prop-icon">♨️</div>
      <div class="prop-text">
        <div class="prop-name">Beppu</div>
        <div class="prop-loc">shiki villa beppu</div>
      </div>
      <span class="prop-badge badge-soon" id="badge-beppu">준비중</span>
    </div>

  </div>
</div>

<script>
  const I18N = {
    ko: { label:'지점을 선택해주세요', sub:'안내를 확인하실 지점을 선택해주세요.', yufuin:'안내 보기', beppu:'준비중' },
    en: { label:'Select a property',   sub:'Please select your property to view the guest guide.', yufuin:'View Guide', beppu:'Coming Soon' },
    ja: { label:'施設をお選びください', sub:'ご利用の施設をお選びください。', yufuin:'ガイドを見る', beppu:'準備中' },
  };

  function setLang(l) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('on'));
    document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('on');
    const i = I18N[l];
    document.getElementById('hero-label').textContent  = i.label;
    document.getElementById('hero-sub').textContent    = i.sub;
    document.getElementById('badge-yufuin').textContent = i.yufuin;
    document.getElementById('badge-beppu').textContent  = i.beppu;
  }
</script>
</body>
</html>
